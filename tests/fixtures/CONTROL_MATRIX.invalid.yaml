# Invalid fixture: allowed and forbidden tools overlap; missing required owner fields
version: "1.0.0"
default_fail_mode: "closed"

controls:
  - id: "cm-test-invalid"
    status: "active"
    description: "Invalid control for negative testing."
    scope: "task"
    applies_to:
      task_types: ["feature"]
      agent_modes: ["builder"]
      skills: ["*"]
    minimum_risk_level: "L1"

    data_class:
      allowed: ["public"]
      forbidden: ["secret"]
      default_if_unknown: "internal"
      unknown_action: "deny"
      redaction_required: true

    tools:
      # INVALID: read_file is in both allowed and forbidden
      allowed:
        - "read_file"
        - "write_file"
      forbidden:
        - "read_file"
        - "deploy_production"
      requires_gate: []

    model:
      vendor: "TBD"
      model_name: "TBD"
      allow_external_vendor: false
      record_model_in_evidence: true

    logs:
      storage_location: ".agile-v/logs/control-events.jsonl"
      include_tool_calls: true
      redact_personal_data: true
      retention_days: 90

    max_permissions:
      file_access: "repo_scoped"

    human_gates:
      required_before: []
      checkpoint_file: ".agile-v/CHECKPOINTS.md"
      approvals_file: ".agile-v/APPROVALS.md"
      require_resume_token: true

    tests:
      required: []

    cost_limit:
      currency: "EUR"
      max_run_cost: 2.00
      max_daily_cost: 25.00
      action_on_limit: "stop"
      cost_log: ".agile-v/logs/costs.jsonl"

    rollback:
      required: true

    # INVALID: owner fields are TBD for an active control
    owner:
      business_owner: "TBD"
      technical_owner: "TBD"
      security_owner: "TBD"
      reviewer: "TBD"

    review:
      last_reviewed: "TBD"
      review_cycle_days: 90
      reviewer_role: "security_owner"
